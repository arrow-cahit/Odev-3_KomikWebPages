<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şakamatik Sitem | Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Şakamatik</h1>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="resimler.html">Resimler</a></li>
                <li><a href="videolar.html">Videolar</a></li>
                <li><a href="kayit.html" class="active">Kayıt Ol</a></li>
                <li><a href="giris.html">Giriş</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="page-title">Aramıza Katıl</h2>

        <div class="form-container">
            <form action="#" method="post">
                
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" name="username" required minlength="3" placeholder="Örn: mizahsor47">
                </div>

                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" name="email" required placeholder="ornek@mail.com">
                </div>

                <div class="form-group">
                    <label for="sifre">Şifre</label>
                    <input type="password" id="sifre" name="sifre" required minlength="6" placeholder="******">
                </div>

                <button type="submit" class="btn-submit">Kayıt İşlemini Tamamla</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Şakamatik - Şık Ödev Projesi</p>
    </footer>
</body>
</html>
